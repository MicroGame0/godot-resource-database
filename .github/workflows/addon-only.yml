name: Update addon-only branch

on:
  push:
    branches:
      - "**"
      - "!addon-only/**"
    paths:
      - "addons/godot-resource-database/**"
      - ".gitignore"
      - ".github/workflows/addon-only.yml"
      - ".github/workflows/sync-addon-only-back.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-addon-only:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate addon-only branch for current branch
        run: |
          set -euo pipefail

          src_branch="${GITHUB_REF_NAME}"
          dst_branch="addon-only/${src_branch}"

          git show HEAD:.gitignore > /tmp/addon-only.gitignore
          git show HEAD:.github/workflows/sync-addon-only-back.yml > /tmp/sync-addon-only-back.yml
          split_sha="$(git subtree split --prefix=addons/godot-resource-database HEAD)"

          git switch --detach "${split_sha}"
          cp /tmp/addon-only.gitignore .gitignore
          mkdir -p .github/workflows
          cp /tmp/sync-addon-only-back.yml .github/workflows/sync-addon-only-back.yml
          git add .gitignore
          git add .github/workflows/sync-addon-only-back.yml
          git rm --cached --ignore-unmatch '*.uid' '*.import'

          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Add addon-only gitignore"
          fi

          git push origin "HEAD:refs/heads/${dst_branch}" --force-with-lease
